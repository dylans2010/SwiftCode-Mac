name: Build SwiftCode

on:
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Build
        run: |
          set -e
          mkdir -p upload
          xcodebuild -project SwiftCode.xcodeproj \
            -scheme SwiftCode \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -archivePath upload/SwiftCode.xcarchive \
            clean \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA
        run: |
          mkdir -p upload/Payload
          cp -R upload/SwiftCode.xcarchive/Products/Applications/*.app upload/Payload/
          cd upload
          zip -r SwiftCode.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftCode-ipa
          path: upload/SwiftCode.ipa

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SwiftCode-build-logs
          path: ~/Library/Logs
